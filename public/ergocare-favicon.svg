<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="arc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#1e88e5"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#43a047"/>
      <stop offset="100%" stop-color="#76c442"/>
    </linearGradient>
  </defs>

  <!-- White background circle -->
  <circle cx="32" cy="32" r="32" fill="white"/>

  <!-- Blue circular arc (left/top sweep) -->
  <path d="M32 4 A28 28 0 0 0 4 32 A28 28 0 0 0 20 56"
        fill="none" stroke="url(#arc)" stroke-width="5.5"
        stroke-linecap="round"/>

  <!-- Green leaf / lower-right curve -->
  <path d="M22 56 Q42 62 56 44 Q48 56 32 54 Q28 60 22 56Z"
        fill="url(#leaf)" opacity="0.9"/>

  <!-- Person: head (navy) -->
  <circle cx="26" cy="17" r="5.5" fill="#1a2a6b"/>

  <!-- Person: torso -->
  <rect x="23" y="22" width="5" height="16" rx="2.5" fill="#1a2a6b"/>

  <!-- Person: upper legs (thigh - horizontal seat) -->
  <rect x="23" y="37" width="14" height="5" rx="2.5" fill="#1a2a6b"/>

  <!-- Person: lower leg (shin - vertical) -->
  <rect x="34" y="40" width="5" height="12" rx="2.5" fill="#1a2a6b"/>

  <!-- Chair seat -->
  <rect x="18" y="41" width="18" height="3.5" rx="1.75" fill="#2c3e6b"/>

  <!-- Desk surface -->
  <rect x="30" y="27" width="20" height="3.5" rx="1.75" fill="#1a2a6b"/>

  <!-- Laptop screen (small rect) -->
  <rect x="40" y="20" width="10" height="8" rx="1.5" fill="#2c3e6b"/>
  <line x1="40" y1="28" x2="50" y2="28" stroke="#1a2a6b" stroke-width="2"/>

  <!-- Spine dots (green) -->
  <circle cx="22" cy="26" r="1.8" fill="#43a047"/>
  <circle cx="22" cy="30" r="1.8" fill="#43a047"/>
  <circle cx="22" cy="34" r="1.8" fill="#43a047"/>

  <!-- Medical cross (top-right, green) -->
  <rect x="48" y="8"  width="5"  height="14" rx="2.5" fill="url(#leaf)"/>
  <rect x="44" y="12" width="13" height="5"  rx="2.5" fill="url(#leaf)"/>
</svg>
